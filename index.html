<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VALENNA</title>

<style>

/* CONFIGURAÇÃO GERAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* CORPO DO SITE */

body{
background:#2b1612;
font-family:Arial,sans-serif;
color:#f5e7d3;
}

/* MENU SUPERIOR */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:#2b1612;
}

/* LOGO */

.logo{

font-size:30px;
font-weight:bold;

letter-spacing:5px;

color:#d4af37;
}

/* MENU */

.menu{

display:flex;
gap:20px;
}

/* LINKS */

.menu a{

text-decoration:none;

color:#f5e7d3;

font-size:14px;
}

/* ÁREA PRINCIPAL */

.hero{

height:90vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;
}

/* TÍTULO */

.hero h1{

font-size:75px;

letter-spacing:8px;

margin-bottom:20px;
}

/* FRASE */

.hero p{

font-size:25px;

margin-bottom:30px;

color:#d4af37;
}

/* BOTÃO */

button{

padding:15px 40px;

background:#d4af37;

border:none;

font-weight:bold;

cursor:pointer;
}

/* RODAPÉ */

footer{

padding:30px;

text-align:center;

background:#140b09;

color:#d4af37;
}

</style>

</head>

<body>

<!-- MENU -->

<header>

<div class="logo">
VALENNA
</div>

<div class="menu">

<a href="#">INÍCIO</a>

<a href="#">COLEÇÃO</a>

<a href="#">SOBRE</a>

<a href="#">CONTATO</a>

</div>

</header>

<!-- CAPA -->

<section class="hero">

<div>

<h1>VALENNA</h1>

<p>Vista sua confiança.</p>

<button>
COMPRAR AGORA
</button>

</div>

</section>

<!-- RODAPÉ -->

<footer>

<p>VALENNA © 2026</p>

<p>Moda fitness • autoestima • elegância feminina</p>

</footer>

</body>

</html>
